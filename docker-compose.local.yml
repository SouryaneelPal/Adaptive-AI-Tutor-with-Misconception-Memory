# ─────────────────────────────────────────────────────────────────────────────
# Adaptive AI Tutor – LOCAL DEV override
# ─────────────────────────────────────────────────────────────────────────────
# Use this when you already have Ollama + models installed locally on Windows.
# This avoids re-downloading models inside Docker.
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build -d
#
# What this does differently from docker-compose.yml:
#   - Runs ONLY the app + neo4j services (no Docker Ollama)
#   - app's OLLAMA_BASE_URL → host.docker.internal:11434 (your local Ollama)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Streamlit Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: adaptive_tutor_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Points to your Windows host's Ollama (already running with gemma4:31b)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      NEO4J_URI: bolt://neo4j:7687
      DATABASE_URL: sqlite:///backend/data/conversations.db
    volumes:
      - conversations_data:/app/backend/data
      - chroma_data:/app/backend/rag/chroma_store
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tutor_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Neo4j (Student Mastery Graph) ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: adaptive_tutor_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - tutor_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  conversations_data:
    driver: local
  chroma_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  tutor_net:
    driver: bridge

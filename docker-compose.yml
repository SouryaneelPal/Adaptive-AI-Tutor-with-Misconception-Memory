# ─────────────────────────────────────────────────────────────────────────────
# Adaptive AI Tutor – Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   app          – Streamlit frontend (http://localhost:8501)
#   neo4j        – Student mastery / misconception graph (bolt://neo4j:7687)
#   ollama       – Local LLM backend (http://ollama:11434)
#   ollama_init  – One-shot model puller (exits after pulling models)
#
# ── LOCAL DEV (Windows, Ollama already installed locally) ───────────────────
#   cp .env.example .env
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build -d
#   # Your local Ollama is used — no model re-download needed!
#
# ── SERVER DEPLOYMENT (RTX A5000 via SSH, full Docker with GPU) ─────────────
#   cp .env.example .env
#   docker compose up --build -d
#   # Models are auto-pulled by ollama_init on first run
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Streamlit Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: adaptive_tutor_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Override connection URLs to point at Docker service names
      OLLAMA_BASE_URL: http://ollama:11434
      NEO4J_URI: bolt://neo4j:7687
      # SQLite inside the container (mounted via volume below).
      # Swap to postgresql+psycopg2://... to use an external Postgres instead.
      DATABASE_URL: sqlite:///backend/data/conversations.db
    volumes:
      # Persist SQLite conversation history across container restarts
      - conversations_data:/app/backend/data
      # Persist ChromaDB vector store (RAG curriculum embeddings)
      - chroma_data:/app/backend/rag/chroma_store
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - tutor_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Neo4j (Student Mastery Graph) ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: adaptive_tutor_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - tutor_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Ollama (Local LLM Backend) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: adaptive_tutor_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - tutor_net
    # GPU support – enabled for server deployment (RTX A5000 + NVIDIA Container Toolkit)
    # On local Windows without GPU passthrough, remove or comment these lines.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Model Puller (one-shot init container) ─────────────────────────────────
  # Pulls the required Ollama models on first startup, then exits.
  # Re-running `docker compose up` will not re-pull already-cached models.
  ollama_init:
    image: ollama/ollama:latest
    container_name: adaptive_tutor_ollama_init
    depends_on:
      - ollama
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - tutor_net
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama to be ready…';
        until ollama list > /dev/null 2>&1; do sleep 3; done;
        echo 'Pulling gemma4:31b…';
        OLLAMA_HOST=http://ollama:11434 ollama pull gemma4:31b;
        echo 'Pulling nomic-embed-text…';
        OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text;
        echo 'All models ready.';
      "
    restart: "no"


# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  conversations_data:
    driver: local
  chroma_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  ollama_models:
    driver: local


# ── Network ────────────────────────────────────────────────────────────────────
networks:
  tutor_net:
    driver: bridge
